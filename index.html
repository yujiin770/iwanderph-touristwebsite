<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTravel Philippines</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <div class="container">
        <header>
            <nav>
                <a href="#" class="logo">
                    <span>iWander PH</span>
                    <i class="fas fa-sun logo-icon"></i>
                </a>
                
                <!-- UPDATED NAVIGATION BAR -->
                <ul class="nav-links">
                    <li><a href="#" class="active">Home</a></li>
                    <li><a href="#">Destination</a></li>
                    <li><a href="#">Booking</a></li>
                    <li><a href="#">Gallery</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>

                <div class="nav-icons">
                    <button id="theme-toggle" class="theme-toggle-btn">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="hamburger">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </nav>
        </header>

        <main class="hero">
            <!-- UPDATED PHILIPPINES-FOCUSED CONTENT -->
            <div class="hero-content">
                <h1>Explore The<br>Islands of The<br>Philippines</h1>
                <p>Discover the stunning beaches, vibrant coral reefs, and breathtaking landscapes of the Pearl of the Orient.</p>
                <button class="explore-btn">Start Your Adventure →</button>
            </div>
            <div class="hero-image-container">
                <!-- This image will be the starting point for the slider -->
                <img src="Assets/Boracay.jfif" alt="Beautiful beach in the Philippines" class="slider-image">
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
